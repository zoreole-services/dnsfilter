options {
    directory "/var/cache/bind";
    listen-on { any; };
    allow-query { any; };
    allow-transfer { any; }; 
    recursion no;
    allow-recursion { none; };
    response-policy { zone "rpz.local"; };
};

zone "rpz.local" {
    type master;
    file "/usr/src/app/zones/rpz.db";
    allow-transfer { any; };
    notify yes;
};

logging {
    category default { null; };
};